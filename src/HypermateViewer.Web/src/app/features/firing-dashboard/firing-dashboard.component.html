<div class="dashboard">
  <!-- Top header bar -->
  <header class="top-header">
    <div class="header-left">
      @if (lines().length > 0 && selectedLine()) {
        <app-line-selector
          [lines]="lines()"
          [selectedLine]="selectedLine()!"
          (lineSelected)="selectLine($event)" />
      }
    </div>
    <div class="header-center">
      <!-- Logo placeholder: replace <span class="brand-logo"> with <img> when PNG is available -->
      <div class="logo-placeholder" title="Logo Hypermate qui">
        <span class="brand-logo">
          <span class="brand-bracket">‹</span><span class="brand-orange">hyper</span><span class="brand-white">mate</span><span class="brand-bracket">›</span>
        </span>
      </div>
    </div>
    <div class="header-right">
      <a routerLink="/logs" class="header-link" title="Storico Logs">📋 Storico</a>
      @if (lastUpdated()) {
        <span class="last-updated">
          🔄 {{ lastUpdated() | date:'HH:mm:ss' }}
        </span>
      }
    </div>
  </header>

  @if (selectedLine()) {
    @if (loading()) {
      <main class="dashboard-content loading-overlay">
        <div class="spinner-container">
          <div class="spinner"></div>
          <p class="loading-text">Caricamento dati...</p>
        </div>
      </main>
    } @else {
      <main class="dashboard-content">
        <div class="steps-grid">
          <app-order-step
            stepType="called"
            [calledOrder]="calledOrder()" />

          <app-order-step
            stepType="entry"
            [calledOrder]="calledOrder()"
            [activeOrder]="entryOrder()"
            [countersActivation]="countersActivation()"
            [orderCounters]="entryCounters()"
            [liveCounters]="entryLive()" />

          <app-order-step
            stepType="exit"
            [calledOrder]="calledOrder()"
            [activeOrder]="exitOrder()"
            [orderCounters]="exitCounters()"
            [liveCounters]="exitLive()"
            [prevStepStatus]="entryOverallStatus()" />
        </div>
      </main>
    }
  } @else {
    <div class="loading">Caricamento linee...</div>
  }
</div>
